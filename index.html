<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Koleksiyonum - Yükle</title>
    <link rel="manifest" href="manifest.json">
    <style>
        body {
            font-family: sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            background-color: #f4f6f9;
        }
        .install-card {
            background: white;
            padding: 30px;
            border-radius: 20px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
            text-align: center;
            max-width: 300px;
        }
        .logo { width: 80px; height: 80px; margin-bottom: 20px; }
        .btn-install {
            background: #002b5c;
            color: white;
            border: none;
            padding: 15px 30px;
            border-radius: 10px;
            font-weight: bold;
            font-size: 18px;
            cursor: pointer;
            width: 100%;
        }
        .btn-skip {
            margin-top: 15px;
            background: none;
            border: none;
            color: #666;
            text-decoration: underline;
            cursor: pointer;
        }
    </style>
</head>
<body>

    <div class="install-card">
        <img src="icon-192.png" alt="Logo" class="logo">
        <h2>Koleksiyonum</h2>
        <p>Koleksiyonunuzu yönetmek için uygulamayı yükleyin.</p>
        <button id="installBtn" class="btn-install">UYGULAMAYI İNDİR</button>
        <button class="btn-skip" onclick="window.location.href='app.html'">Tarayıcıda Devam Et</button>
    </div>

    <script>
        let deferredPrompt;
        const installBtn = document.getElementById('installBtn');

        // Service Worker Kaydı
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('sw.js');
        }

        // Yükleme istemini yakala
        window.addEventListener('beforeinstallprompt', (e) => {
            e.preventDefault();
            deferredPrompt = e;
            installBtn.style.display = 'block';
        });

        installBtn.addEventListener('click', async () => {
            if (deferredPrompt) {
                deferredPrompt.prompt();
                const { outcome } = await deferredPrompt.userChoice;
                if (outcome === 'accepted') {
                    console.log('Kullanıcı kabul etti');
                }
                deferredPrompt = null;
            } else {
                // Eğer buton çıkmazsa veya desteklenmiyorsa direkt uygulamaya yönlendir
                window.location.href = 'app.html';
            }
        });

        // Uygulama yüklendiyse otomatik yönlendir (Opsiyonel)
        window.addEventListener('appinstalled', () => {
            window.location.href = 'app.html';
        });
    </script>
</body>
</html>
