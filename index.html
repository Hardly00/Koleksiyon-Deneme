<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <title>Koleksiyonum</title>
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#d11212">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">

    <script src="https://unpkg.com/html5-qrcode"></script>

    <style>
        :root {
            --primary-navy: #002b5c; 
            --brick-red: #d11212;
            --brick-yellow: #ffcf00;
            --success-green: #28a745;
            --accent-blue: #005596;
            --bg-light: #f4f6f9;
            --card-bg: #ffffff;
            --text-dark: #1a1a1a;
            --border-color: #dee2e6;
        }

        body.dark-mode {
            --bg-light: #0f172a;
            --card-bg: #1e293b;
            --text-dark: #f8fafc;
            --border-color: #334155;
            --primary-navy: #1e293b;
        }

        body {
            font-family: 'Segoe UI', Roboto, sans-serif;
            background-color: var(--bg-light);
            color: var(--text-dark);
            margin: 0; padding: 15px; transition: 0.3s;
            padding-bottom: 160px; 
            scroll-behavior: smooth;
            font-size: 16px;
        }

        .container { max-width: 1300px; margin: 0 auto; display: grid; grid-template-columns: 320px 1fr; gap: 20px; }

        header {
            grid-column: 1 / -1;
            display: flex; justify-content: space-between; align-items: center;
            padding: 15px 20px; background: var(--primary-navy); color: white;
            border-radius: 12px; margin-bottom: 10px;
        }

        .nav-wrapper { grid-column: 1 / -1; position: sticky; top: 10px; z-index: 3000; margin-bottom: 15px; }
        .nav-toggle-btn {
            width: 100%; padding: 12px; background: var(--accent-blue); color: white;
            border: 2px solid white; border-radius: 8px; cursor: pointer; font-weight: bold;
            display: flex; justify-content: space-between; align-items: center; font-size: 16px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.2);
        }
        .nav-panel {
            background: var(--card-bg); padding: 15px; border-radius: 0 0 10px 10px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.2); display: none; flex-wrap: wrap; gap: 10px; border: 1px solid var(--border-color); border-top: none;
        }
        .nav-panel.open { display: flex; }
        .nav-link { padding: 8px 15px; background: #eee; border-radius: 20px; text-decoration: none; color: #333; font-size: 14px; font-weight: bold; border: 1px solid #ddd; }

        .last-added-card {
            background: var(--card-bg); padding: 15px; border-radius: 12px;
            border-top: 5px solid var(--brick-red); box-shadow: 0 4px 6px rgba(0,0,0,0.05);
            text-align: center; margin-bottom: 20px;
        }
        .last-added-card img { width: 100%; height: 80px; object-fit: contain; margin-bottom: 10px; }

        .scroll-tools { position: fixed; right: 10px; bottom: 85px; display: flex; flex-direction: column; gap: 8px; z-index: 4500; }
        .bottom-left-tools { position: fixed; left: 10px; bottom: 85px; z-index: 4500; }
        
        .tool-btn { 
            width: 50px; height: 50px; border-radius: 50%; 
            background: var(--brick-red); color: white; border: 2px solid white; 
            cursor: pointer; font-size: 20px; box-shadow: 0 4px 10px rgba(0,0,0,0.3); 
            display: flex; align-items: center; justify-content: center; 
        }

        .controls { background: var(--card-bg); padding: 20px; border-radius: 12px; display: flex; flex-direction: column; gap: 15px; box-shadow: 0 4px 6px rgba(0,0,0,0.05); }
        .set-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(180px, 1fr)); gap: 12px; }
        
        .set-card {
            border: 1px solid var(--border-color); padding: 10px; border-radius: 10px;
            background: var(--card-bg); display: flex; flex-direction: column;
            min-height: 320px; height: auto; box-sizing: border-box; position: relative;
        }
        
        .btn-akakce { position: absolute; top: 8px; right: 8px; width: 32px; height: 32px; background: #fff; border: 1px solid #ddd; border-radius: 6px; display: flex; align-items: center; justify-content: center; text-decoration: none; z-index: 10; }

        .set-card img { width: 100%; height: 110px; object-fit: contain; margin-bottom: 8px; }
        .set-name { font-size: 13px; font-weight: bold; margin-bottom: 4px; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
        
        .card-inputs { display: flex; flex-direction: column; gap: 4px; margin-bottom: 8px; position: relative; }
        .price-label { font-size: 16px; font-weight: 800; color: var(--brick-red); margin-bottom: 2px; }
        .card-inputs input { padding: 8px; font-size: 13px; border: 1px solid var(--border-color); border-radius: 5px; width: 100%; box-sizing: border-box; padding-right: 30px; }
        
        .btn-clear-price { position: absolute; right: 8px; bottom: 8px; background: none; border: none; color: #dc3545; cursor: pointer; font-size: 16px; font-weight: bold; }

        .card-actions { margin-top: auto; display: flex; flex-direction: column; gap: 6px; }

        .btn { border: none; border-radius: 8px; cursor: pointer; color: white; font-weight: bold; padding: 12px; font-size: 14px; width: 100%; transition: 0.2s; }
        .btn-add { background-color: var(--accent-blue); }
        .btn-cat { background-color: var(--success-green); }
        .btn-instr { background-color: var(--brick-yellow); color: #000; text-decoration: none; text-align: center; display: block; font-size: 12px; padding: 8px; border-radius: 6px; }
        .btn-delete { background-color: #dc3545; font-size: 12px; padding: 8px; border: 1px solid #000; }
        .btn-danger { background-color: #d9534f; margin-top: 10px; }

        .category-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 10px; }
        .btn-goto-last { background: #6c757d; color: white; border: none; padding: 4px 8px; border-radius: 5px; font-size: 10px; cursor: pointer; font-weight: bold; }

        .category-section { background: var(--card-bg); padding: 15px; border-radius: 12px; margin-bottom: 20px; border-left: 8px solid; scroll-margin-top: 100px; }

        .total-panel { position: fixed; bottom: 0; left: 0; right: 0; background: var(--primary-navy); color: white; padding: 15px 5px; display: grid; grid-template-columns: 1fr 1fr 1fr; border-top: 4px solid var(--brick-yellow); z-index: 4000; text-align: center; }
        .total-val { color: var(--brick-yellow); font-weight: bold; font-size: 15px; }

        #reader { width: 100%; border-radius: 8px; overflow: hidden; margin-top: 10px; }

        @media (max-width: 850px) {
            .container { grid-template-columns: 1fr; }
            /* MOBİLDE EKRAN BÖLÜNME SORUNU DÜZELTİLDİ: Sidebar artık akışta kalır */
            .sidebar { 
                position: relative; 
                top: 0; 
                z-index: 10;
                max-height: none;
                overflow-y: visible;
                border-bottom: 2px solid var(--border-color);
            }
            .main-content { order: 2; }
            .btn { padding: 15px; font-size: 16px; }
            .tool-btn { width: 42px; height: 42px; font-size: 18px; }
            .scroll-tools { bottom: 80px; right: 8px; }
            .bottom-left-tools { bottom: 80px; left: 8px; }
        }
    </style>
</head>
<body>

<div id="qrModal" style="display:none; position:fixed; top:20px; left:50%; transform:translateX(-50%); width:90%; max-width:400px; background:white; border:2px solid blue; border-radius:15px; z-index:5000; padding:15px; text-align:center;">
    <h4 style="margin-top:0;">QR Okundu</h4>
    <p id="modalUrl" style="font-size:12px; word-break:break-all; background:#f4f4f4; padding:10px; border-radius:5px; margin-bottom:15px;"></p>
    <button class="btn" style="background:green; margin-bottom:10px;" onclick="koduAyikla()">🎯 Kodu Ayıkla</button>
    <button class="btn" style="background:gray;" onclick="modalKapat()">Kapat</button>
</div>

<div class="scroll-tools">
    <button class="tool-btn" onclick="window.scrollTo(0,0)">▲</button>
    <button class="tool-btn" onclick="window.scrollTo(0, document.body.scrollHeight)">▼</button>
</div>

<div class="bottom-left-tools">
    <button class="tool-btn" style="background: var(--primary-navy);" onclick="toggleDarkMode()">🌓</button>
</div>

<header>
    <h2 style="margin:0; font-size: 20px;">KOLEKSİYONUM</h2>
    <span style="font-size: 14px; background: var(--brick-red); padding: 5px 12px; border-radius: 20px;">Set: <span id="grandTotalCount">0</span></span>
</header>

<div class="nav-wrapper">
    <button class="nav-toggle-btn" onclick="toggleNav()">📂 Grupları Göster / Gizle <span id="navArrow">▼</span></button>
    <div class="nav-panel" id="navLinks"></div>
</div>

<div class="container">
    <div class="sidebar">
        <div id="lastAddedContainer" class="last-added-card">
            <h4 style="margin:0 0 10px 0; color:var(--brick-red); font-size: 14px;">Son Eklenen Set</h4>
            <div id="lastAddedContent" style="font-size: 11px; font-weight: bold;">Henüz set eklenmedi.</div>
        </div>

        <div class="controls">
            <div class="panel">
                <h4 style="font-size:18px;">Grup Ekle</h4>
                <input type="text" id="newCatInput" placeholder="Kategori Adı..." style="padding:12px; width:100%; border-radius:8px; border:1px solid #ccc; box-sizing:border-box; font-size:16px;">
                <button class="btn btn-cat" style="margin-top:10px;" onclick="kategoriEkle()">+ Grup Oluştur</button>
            </div>
            <div class="panel">
                <h4 style="font-size:18px;">Yeni Set</h4>
                <div id="reader" style="display:none;"></div>
                <button id="scanBtn" class="btn" style="background:var(--primary-navy)" onclick="barkodTarayiciyiBaslat()">📷 Barkod/QR Tara</button>
                <input type="text" id="setNo" placeholder="Set Kodu..." style="margin-top:12px; padding:12px; width:100%; border-radius:8px; border:1px solid #ccc; box-sizing:border-box; font-size:16px;">
                <input type="number" id="priceInput" placeholder="Alış Fiyatı (₺)" style="margin-top:10px; padding:12px; width:100%; border-radius:8px; border:1px solid #ccc; box-sizing:border-box; font-size:16px;">
                <select id="categorySelect" style="margin-top:10px; padding:12px; width:100%; border-radius:8px; border:1px solid #ccc; font-size:16px;"></select>
                <button class="btn btn-add" style="margin-top:12px;" onclick="setGetir()">Ekle</button>
            </div>
            <div class="panel">
                <button class="btn" style="background:#6c757d;" onclick="verileriYedekle()">📥 Yedekle</button>
                <button class="btn" style="background:#6c757d; margin-top:8px;" onclick="document.getElementById('importInput').click()">📤 Yükle</button>
                <button class="btn btn-danger" onclick="hepsiniSil()">🗑️ Hepsini Sil</button>
                <input type="file" id="importInput" style="display:none" onchange="verileriYukle(event)">
            </div>
        </div>
    </div>
    <div class="main-content" id="mainDisplay"></div>
</div>

<div class="total-panel">
    <div><span>Parça: </span><span id="totalParts" class="total-val">0</span></div>
    <div><span>Güncel: </span><span id="totalCurrent" class="total-val">0 ₺</span></div>
    <div><span>Alış: </span><span id="totalTaken" class="total-val">0 ₺</span></div>
</div>

<script>
    const API_KEY = 'c10a8ebe89136b8802982ac9523cd8bf'; 
    const DB_NAME = 'Koleksiyon'; 
    let db, koleksiyon = {}, kategoriRenkleri = {}, sonSet = null, isDarkMode = localStorage.getItem('darkMode') === 'true';
    let html5QrCode;

    function toggleNav() {
        const panel = document.getElementById('navLinks');
        const arrow = document.getElementById('navArrow');
        panel.classList.toggle('open');
        arrow.innerText = panel.classList.contains('open') ? '▲' : '▼';
    }

    function toggleDarkMode() {
        isDarkMode = !isDarkMode;
        document.body.classList.toggle('dark-mode');
        localStorage.setItem('darkMode', isDarkMode);
    }

    async function init() {
        const request = indexedDB.open(DB_NAME, 1);
        request.onupgradeneeded = e => e.target.result.createObjectStore('data');
        request.onsuccess = async e => {
            db = e.target.result;
            koleksiyon = await dbGet('koleksiyon') || {};
            kategoriRenkleri = await dbGet('renkler') || {};
            sonSet = await dbGet('sonSet') || null;
            if(isDarkMode) document.body.classList.add('dark-mode');
            dropdownGuncelle();
            ekranıCiz();
            sonSetiGoster();
        };
    }

    async function dbGet(k) {
        return new Promise(res => {
            const tx = db.transaction(['data'], 'readonly');
            const req = tx.objectStore('data').get(k);
            req.onsuccess = () => res(req.result);
        });
    }

    async function dbSet(k, v) {
        const tx = db.transaction(['data'], 'readwrite');
        tx.objectStore('data').put(v, k);
    }

    function koduAyikla() {
        const url = document.getElementById('modalUrl').innerText;
        const matches = url.match(/\d{4,7}/);
        if (matches) { 
            const cleanCode = matches[0].replace(/^0+/, '');
            document.getElementById('setNo').value = cleanCode; 
            modalKapat(); 
        }
    }

    function modalKapat() { document.getElementById('qrModal').style.display = 'none'; }

    async function barkodTarayiciyiBaslat() {
        const readerDiv = document.getElementById('reader');
        if (readerDiv.style.display === 'block') { if(html5QrCode) await html5QrCode.stop(); readerDiv.style.display = 'none'; return; }
        readerDiv.style.display = 'block';
        html5QrCode = new Html5Qrcode("reader");
        html5QrCode.start({ facingMode: "environment" }, { fps: 20, qrbox: 250 }, (txt) => {
            document.getElementById('modalUrl').innerText = txt;
            document.getElementById('qrModal').style.display = 'block';
            html5QrCode.stop(); readerDiv.style.display = 'none';
        }).catch(err => alert("Kamera başlatılamadı."));
    }

    async function kategoriEkle() {
        const isim = document.getElementById('newCatInput').value.trim();
        if (isim && !koleksiyon[isim]) {
            koleksiyon[isim] = [];
            kategoriRenkleri[isim] = `hsl(${Math.floor(Math.random() * 360)}, 70%, 50%)`;
            await dbSet('koleksiyon', koleksiyon);
            await dbSet('renkler', kategoriRenkleri);
            dropdownGuncelle();
            document.getElementById('newCatInput').value = '';
            ekranıCiz();
        }
    }

    function dropdownGuncelle() {
        const select = document.getElementById('categorySelect');
        const nav = document.getElementById('navLinks');
        
        // Kategorileri set sayısına göre büyükten küçüğe sırala
        const sortedKeys = Object.keys(koleksiyon).sort((a, b) => {
            return (koleksiyon[b]?.length || 0) - (koleksiyon[a]?.length || 0);
        });

        select.innerHTML = sortedKeys.map(k => `<option value="${k}">${k}</option>`).join('');
        nav.innerHTML = sortedKeys.map(k => `<a href="#section-${k}" class="nav-link" onclick="toggleNav()">${k}</a>`).join('');
    }

    async function setGetir() {
        const setNo = document.getElementById('setNo').value.trim();
        const fiyat = parseFloat(document.getElementById('priceInput').value) || 0;
        const kat = document.getElementById('categorySelect').value;
        if(!setNo || !kat) return;
        try {
            const res = await fetch(`https://rebrickable.com/api/v3/lego/sets/${setNo}-1/`, { headers: {'Authorization': `key ${API_KEY}`} });
            const data = await res.json();
            const yeniSet = { 
                id: data.set_num, 
                name: data.name, 
                img: data.set_img_url, 
                parts: data.num_parts, 
                takenPrice: fiyat, 
                currentPrice: 0, 
                instructions: `https://www.lego.com/en-us/service/buildinginstructions/${data.set_num.split('-')[0]}` 
            };
            koleksiyon[kat].push(yeniSet);
            sonSet = yeniSet;
            await dbSet('koleksiyon', koleksiyon);
            await dbSet('sonSet', sonSet);
            document.getElementById('setNo').value = ''; document.getElementById('priceInput').value = '';
            
            // Ekleme sonrası hem sıralama için dropdown'ı hem de ekranı güncelle
            dropdownGuncelle();
            ekranıCiz();
            sonSetiGoster();
        } catch (e) { alert("Bulunamadı."); }
    }

    function sonSetiGoster() {
        const container = document.getElementById('lastAddedContent');
        if(!sonSet) return;
        container.innerHTML = `<img src="${sonSet.img}"><br>${sonSet.name}`;
    }

    function scrollLastSet(kat) {
        const sets = koleksiyon[kat];
        if (sets && sets.length > 0) {
            const lastSetId = `set-${kat}-${sets.length - 1}`;
            const element = document.getElementById(lastSetId);
            if (element) element.scrollIntoView({ behavior: 'smooth', block: 'center' });
        }
    }

    function ekranıCiz() {
        const display = document.getElementById('mainDisplay');
        display.innerHTML = '';
        let tTaken = 0, tCurrent = 0, tParts = 0, tSets = 0;

        // Kategorileri ekrana çizerken de sıralamaya göre çiz
        const sortedKeys = Object.keys(koleksiyon).sort((a, b) => {
            return (koleksiyon[b]?.length || 0) - (koleksiyon[a]?.length || 0);
        });

        sortedKeys.forEach(kat => {
            const sets = koleksiyon[kat];
            const renk = kategoriRenkleri[kat] || '#002b5c';
            const katDiv = document.createElement('div');
            katDiv.className = 'category-section';
            katDiv.id = `section-${kat}`;
            katDiv.style.borderColor = renk;
            
            katDiv.innerHTML = `
                <div class="category-header">
                    <h4 style="color:${renk}; margin:0; font-size:18px;">${kat} (${sets.length})</h4>
                    <button class="btn-goto-last" onclick="scrollLastSet('${kat}')">⬇ Son Set</button>
                </div>
                <div class="set-grid"></div>`;
            
            const grid = katDiv.querySelector('.set-grid');

            sets.forEach((set, idx) => {
                const cleanID = set.id.split('-')[0];
                tTaken += set.takenPrice; tCurrent += (set.currentPrice || 0); tParts += (set.parts || 0); tSets++;
                grid.innerHTML += `
                    <div class="set-card" id="set-${kat}-${idx}">
                        <a href="https://www.akakce.com/arama/?q=lego+${cleanID}" target="_blank" class="btn-akakce">🔍</a>
                        <img src="${set.img}">
                        <div class="set-name">${set.name}</div>
                        <div style="font-size:11px; color:gray; margin-bottom:6px;">🧩 ${set.parts}p</div>
                        <div class="card-inputs">
                            <label class="price-label">Alış: ${set.takenPrice}₺</label>
                            <input type="number" placeholder="Güncel ₺" value="${set.currentPrice || ''}" onchange="fiyatGuncelle('${kat}', ${idx}, this.value)">
                            <button class="btn-clear-price" onclick="fiyatSil('${kat}', ${idx})">✖</button>
                        </div>
                        <div class="card-actions">
                            <a href="${set.instructions}" target="_blank" class="btn-instr">📖 Talimat</a>
                            <button class="btn-delete" onclick="setSil('${kat}', ${idx})">Sil</button>
                        </div>
                    </div>`;
            });
            display.appendChild(katDiv);
        });
        document.getElementById('grandTotalCount').innerText = tSets;
        document.getElementById('totalParts').innerText = tParts.toLocaleString();
        document.getElementById('totalCurrent').innerText = tCurrent.toLocaleString() + " ₺";
        document.getElementById('totalTaken').innerText = tTaken.toLocaleString() + " ₺";
    }

    async function fiyatGuncelle(kat, idx, val) { koleksiyon[kat][idx].currentPrice = parseFloat(val) || 0; await dbSet('koleksiyon', koleksiyon); ekranıCiz(); }
    async function fiyatSil(kat, idx) { koleksiyon[kat][idx].currentPrice = 0; await dbSet('koleksiyon', koleksiyon); ekranıCiz(); }
    async function setSil(kat, idx) { if(confirm("Silinsin mi?")) { koleksiyon[kat].splice(idx, 1); await dbSet('koleksiyon', koleksiyon); dropdownGuncelle(); ekranıCiz(); } }
    
    async function hepsiniSil() {
        if(confirm("Eğer evet derseniz eklenen tüm setler silinecektir (Yedek Alınız).")) {
            koleksiyon = {};
            kategoriRenkleri = {};
            sonSet = null;
            await dbSet('koleksiyon', koleksiyon);
            await dbSet('renkler', kategoriRenkleri);
            await dbSet('sonSet', sonSet);
            dropdownGuncelle();
            ekranıCiz();
            sonSetiGoster();
        }
    }

    function verileriYedekle() { const blob = new Blob([JSON.stringify({koleksiyon, renkler: kategoriRenkleri, sonSet})], {type: "application/json"}); const a = document.createElement("a"); a.href = URL.createObjectURL(blob); a.download = `brick_yedek.json`; a.click(); }
    async function verileriYukle(e) { const r = new FileReader(); r.onload = async (ev) => { const d = JSON.parse(ev.target.result); koleksiyon = d.koleksiyon; kategoriRenkleri = d.renkler; sonSet = d.sonSet; await dbSet('koleksiyon', koleksiyon); await dbSet('renkler', kategoriRenkleri); await dbSet('sonSet', sonSet); dropdownGuncelle(); ekranıCiz(); sonSetiGoster(); }; r.readAsText(e.target.files[0]); }

    init();
</script>
</body>
</html>
